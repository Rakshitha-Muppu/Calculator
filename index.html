<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
   <h2>Calculator</h2>
    <div class="box">
        <input type="text" id="input" readonly>
        <div class="row">
            <button class="special" id="clear">AC</button>
            <button class="special">DEL</button>
            <button class="special">%</button>
            <button class="special">/</button>
        </div>
        <div class="row">
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="special">x</button>
        </div>
        <div class="row">
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="special">+</button>
        </div>

        <div class="row">
            <button >1</button>
            <button >2</button>
            <button >3</button>
            <button class="special">-</button>
        </div>
        <div class="row">
            <button >0</button>
            <button >00</button>
            <button >.</button>
            <button id="equalbtn">=</button>
        </div>
    </div>

</div>
    
    <script src="script.js"></script>
</body>

</html>
